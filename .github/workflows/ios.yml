name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build WaterLove
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Build for iOS Simulator
        id: build
        run: |
          set +e
          xcodebuild \
            -project WaterLove.xcodeproj \
            -scheme WaterLove \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          mkdir -p .ci-logs
          grep -Ei "error:|fatal error:|The following build commands failed|SwiftCompile|CompileSwift" xcodebuild.log > .ci-logs/latest-xcodebuild-errors.log || true
          exit $status

      - name: Commit failure log
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci-logs/latest-xcodebuild-errors.log
          git commit -m "Add CI failure log [skip ci]" || true
          git push || true
